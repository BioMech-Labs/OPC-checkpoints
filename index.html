<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OL Pipeline</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>

<body class="bg-slate-100">

<header class="bg-black text-white p-4 flex justify-between">
  <div class="font-bold">OL Pipeline</div>
  <div id="statusDot" class="w-3 h-3 bg-red-500 rounded-full"></div>
</header>

<div class="max-w-3xl mx-auto p-4 space-y-6">

<input id="batchId" placeholder="Batch ID" class="w-full p-3 rounded-xl border font-bold">

<!-- GATE 1 -->
<div class="bg-white p-4 rounded-xl gate-card" data-gate="1">
  <h2 class="font-bold">1. Micropillars</h2>
  <input type="checkbox" class="gate-check"> OK

  <input type="file" class="hidden img-input" accept="image/*" capture="environment" multiple>
  <button onclick="upload(this)">Add Image</button>

  <div class="img-preview flex gap-2 flex-wrap"></div>

  <button class="sync-btn">Sync</button>
</div>

<!-- GATE 4 -->
<div class="bg-white p-4 rounded-xl gate-card" data-gate="4">
  <h2 class="font-bold">4. OPC Isolation</h2>

  Pups: <input id="pups" type="number" value="1"><br>

  <h3>Pre-MACS</h3>
  Count <input id="preCount">
  Viability <input id="preViability">

  <input type="file" class="hidden img-input" data-slot="pre" accept="image/*" capture="environment" multiple>
  <button onclick="upload(this)">Add Pre Image</button>
  <div class="img-preview" data-slot="pre"></div>

  <h3>Post-MACS</h3>
  Count <input id="postCount">
  Viability <input id="postViability">

  <input type="file" class="hidden img-input" data-slot="post" accept="image/*" capture="environment" multiple>
  <button onclick="upload(this)">Add Post Image</button>
  <div class="img-preview" data-slot="post"></div>

  <div>Cells/Pup: <span id="cpp">0</span></div>

  <button class="sync-btn">Sync</button>
</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyB_uwp8zHg3SX0pzgWYkLrtnmlb0Ag1Gb0",
authDomain: "biomech-eaf84.firebaseapp.com",
projectId: "biomech-eaf84",
storageBucket: "biomech-eaf84.firebasestorage.app",
messagingSenderId: "395514379581",
appId: "1:395514379581:web:ac639064af3dba0a995954"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let batch = null;

document.getElementById("batchId").onchange = e => {
  batch = e.target.value;
  db.collection("ol").doc(batch).onSnapshot(d => {
    document.getElementById("statusDot").style.background="green";
    if(d.exists) render(d.data());
  });
};

function upload(btn){
  btn.parentElement.querySelector(".img-input").click();
}

document.querySelectorAll(".img-input").forEach(inp=>{
  inp.onchange = async e=>{
    if(!batch) return alert("Batch first");

    const card = e.target.closest(".gate-card");
    const gate = card.dataset.gate;
    const slot = e.target.dataset.slot || "main";
    const preview = card.querySelector(`.img-preview[data-slot="${slot}"]`) || card.querySelector(".img-preview");

    for(const file of e.target.files){
      let name = prompt("Image name?", file.name);
      if(!name) return;

      const path = `batches/${batch}/g${gate}/${Date.now()}_${name}`;
      const ref = storage.ref().child(path);

      await ref.put(file);
      const url = await ref.getDownloadURL();

      addImg(preview,url,name,path);
    }
  };
});

function addImg(preview,url,name,path){
  const d = document.createElement("div");
  d.innerHTML = `
    <img src="${url}" class="w-20 h-20 object-cover">
    <div>${name}</div>
    <button onclick="del(this)">X</button>
  `;
  d.dataset.path = path;
  preview.appendChild(d);
}

async function del(btn){
  const d = btn.parentElement;
  await storage.ref().child(d.dataset.path).delete();
  d.remove();
}

document.querySelectorAll(".sync-btn").forEach(btn=>{
  btn.onclick = ()=>{
    const card = btn.closest(".gate-card");
    const gate = card.dataset.gate;

    let data = {
      imgs: Array.from(card.querySelectorAll("img")).map(i=>i.src)
    };

    if(gate=="4"){
      data.pre = {
        count: document.getElementById("preCount").value,
        viability: document.getElementById("preViability").value
      };
      data.post = {
        count: document.getElementById("postCount").value,
        viability: document.getElementById("postViability").value
      };
      data.cpp = document.getElementById("cpp").innerText;
    }

    db.collection("ol").doc(batch).set({["g"+gate]:data},{merge:true});
  };
});

function render(d){
  console.log(d);
}

document.addEventListener("input",()=>{
  let p = document.getElementById("pups").value || 1;
  let c = document.getElementById("postCount").value || 0;
  document.getElementById("cpp").innerText = Math.round(c/p);
});

</script>
</body>
</html>
